server:
  port: 8080

spring:
  application:
    name: v-rule
  profiles:
    active: public
  datasource:
    url: jdbc:mysql://localhost:3306/v_rule
    username: root
    password: 123456
    driver-call-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true

  redis:
    database: 1
    host: localhost
    port: 6379
    jedis:
      pool:
        max-active: 8
        max-wait: 1
        max-idle: 1
        min-idle: 1
    timeout: 0